<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Grid</title>
  <style>
    .er-diagram {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin: 40px;
    }

    .table {
      background: #f9f9f9;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 10px 15px;
      width: 200px;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
    }

    .table h3 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 1.1em;
      color: #222;
    }

    .table ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .table li {
      font-size: 0.9em;
      border-bottom: 1px solid #ddd;
      padding: 4px 0;
    }

    .relations {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 200px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="er-diagram">
    <!-- Таблица Ucenik -->
    <div class="table" id="ucenik">
      <h3>ucenik</h3>
      <ul>
        <li>iducenik INT</li>
        <li>ime VARCHAR(45)</li>
        <li>prezime VARCHAR(45)</li>
        <li>osnovna_skola_id INT</li>
        <li>mesto_id INT</li>
      </ul>
    </div>

    <!-- Таблица Osnovna Skola -->
    <div class="table" id="osnovna_skola">
      <h3>osnovna_skola</h3>
      <ul>
        <li>idosnovna_skola INT</li>
        <li>naziv VARCHAR(45)</li>
        <li>mesto_id INT</li>
      </ul>
    </div>

    <!-- Таблица Mesto -->
    <div class="table" id="mesto">
      <h3>mesto</h3>
      <ul>
        <li>idmesto INT</li>
        <li>naziv VARCHAR(45)</li>
      </ul>
    </div>

    <!-- SVG линии -->
    <svg width="100%" height="100%" viewBox="0 0 1200 800">
      <!-- Таблица ucenik -->
      <rect x="50" y="50" width="200" height="120" fill="#f9f9f9" stroke="#333" />
      <text x="60" y="70" font-size="14">ucenik</text>

      <!-- Таблица osnovna_skola -->
      <rect x="400" y="50" width="200" height="100" fill="#f9f9f9" stroke="#333" />
      <text x="410" y="70" font-size="14">osnovna_skola</text>

      <!-- Связь -->
      <line x1="250" y1="100" x2="400" y2="100" stroke="black" stroke-width="2" marker-end="url(#arrow)" />

      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="black" />
        </marker>
      </defs>
    </svg>

  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Grid</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f2a;
      color: #eee;
      padding: 20px;
    }

    .data-grid {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .grid-header {
      display: grid;
      grid-template-columns: 120px 1fr 100px 100px 120px;
      background: #16213e;
      padding: 14px 16px;
      font-weight: 600;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .grid-row {
      display: grid;
      grid-template-columns: 120px 1fr 100px 100px 120px;
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      transition: background 0.2s;
    }

    .grid-row:hover {
      background: #1e2a4a;
    }

    .grid-row:last-child {
      border-bottom: none;
    }

    .grid-cell {
      padding: 4px 8px;
      display: flex;
      align-items: center;
    }

    .text-right { justify-content: flex-end; }
    .text-center { justify-content: center; }

    .status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status.good    { background: #22c55e; color: #000; }
    .status.moderate{ background: #eab308; color: #000; }
    .status.poor    { background: #ef4444; color: #fff; }

    .header-cell {
      font-weight: 600;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <h1 style="text-align:center; margin-bottom:20px;">Data Grid</h1>

  <div class="data-grid" id="dataGrid">
    <!-- Заголовки -->
    <div class="grid-header">
      <div class="header-cell">Время</div>
      <div class="header-cell">Город</div>
      <div class="header-cell text-right">Темп. (°C)</div>
      <div class="header-cell text-right">Влажность</div>
      <div class="header-cell text-center">Статус</div>
    </div>

    <!-- Данные будут вставляться сюда через JS -->
  </div>

  <script>
    const data = [
      { time: "09:00", city: "Белград", temp: 18.5, humidity: 65, status: "good" },
      { time: "10:00", city: "Нови Сад", temp: 19.2, humidity: 62, status: "good" },
      { time: "11:00", city: "Ниш", temp: 22.1, humidity: 58, status: "moderate" },
      { time: "12:00", city: "Крагуевац", temp: 24.8, humidity: 45, status: "poor" },
      { time: "13:00", city: "Суботица", temp: 17.3, humidity: 71, status: "good" },
      { time: "14:00", city: "Зренянин", temp: 21.5, humidity: 53, status: "moderate" },
    ];

    function renderGrid() {
      const grid = document.getElementById('dataGrid');

      data.forEach(item => {
        const row = document.createElement('div');
        row.className = 'grid-row';

        row.innerHTML = `
          <div class="grid-cell">${item.time}</div>
          <div class="grid-cell">${item.city}</div>
          <div class="grid-cell text-right">${item.temp}°C</div>
          <div class="grid-cell text-right">${item.humidity}%</div>
          <div class="grid-cell text-center">
            <span class="status ${item.status}">${item.status === 'good' ? 'Хорошо' : 
                                                    item.status === 'moderate' ? 'Умеренно' : 'Плохо'}</span>
          </div>
        `;

        grid.appendChild(row);
      });
    }

    // Запуск при загрузке
    window.onload = renderGrid;
  </script>

</body>
</html>

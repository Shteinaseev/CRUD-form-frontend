<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>crud form</title>
   <script type="module" src="/src/scripts/index.js"></script>
   <script type="module" src="/src/scripts/fluid-gradient.js"></script>
   <link rel="stylesheet" href="src/styles/style.css">
</head>

<body>
   <svg style="display: none">
      <filter id="glass-distortion">
         <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
         <feDisplacementMap in="SourceGraphic" in2="noise" scale="77" />
      </filter>
   </svg>
   <canvas id="canvas3d"></canvas>
   <main class="content" data-js>
      <div class="glass-form">
         <div class="glass-filter"></div>
         <div class="glass-overlay"></div>
         <div class="glass-specular"></div>
         <form class="glass-content">
            <form-group title="Ime" type="text" icon="User"></form-group>
            <form-group title="Prezime" type="text" icon="User"></form-group>
            <form-group title="JMBG" type="text" icon="User"></form-group>
            <form-group title="Lozinka" type="text" icon="User"></form-group>
         </form>
      </div>
      <section class="entity-card-slider">
         <i data-bx="chevron-right" data-width="64" data-height="64"></i>
         <div class="container" data-js-entity-card-cont>

         </div>
         <i data-bx="chevron-left" data-width="64" data-height="64"></i>

      </section>
   </main>

</body>

</html>

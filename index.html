<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>crud form</title>
   <script type="module" src="/src/scripts/index.js"></script>
   <link rel="stylesheet" href="src/styles/style.css">
   <link rel="stylesheet" href="src/styles/navbar.css">
</head>

<body>
   <svg style="display: none">
      <filter id="glass-distortion">
         <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
         <feDisplacementMap in="SourceGraphic" in2="noise" scale="77" />
      </filter>
   </svg>

   <!-- <canvas id="canvas3d"></canvas> -->
   <div class="reflect-container" data-js-reflect-container>
      <div class="backdrop-blur-md" data-js-blur-overlay></div>
   </div>
   <nav class="navbar" aria-label="Main menu">
      <div class="glass-filter"></div>
      <div class="glass-overlay"></div>
      <div class="glass-specular"></div>
      <button class="burger-btn" aria-label="Open the menu" aria-expanded="false">
         <i data-bx="menu"></i>
      </button>
   </nav>
   <main class="content" data-js>
      <aside class="glass-form">
         <div class="glass-filter"></div>
         <div class="glass-overlay"></div>
         <div class="glass-specular"></div>
         <form class="glass-content">
            <form-group title="Ime" type="text" icon="User"></form-group>
            <form-group title="Prezime" type="text" icon="User"></form-group>
            <form-group title="Datum rodjenja" type="date" icon=""></form-group>
            <form-group title="JMBG" type="text" icon="User" min-length="13" max-length="13" number="true"></form-group>
            <form-group title="Broj Stana" type="number" icon="Home"></form-group>
            <form-group title="Telefon fiksni" type="tel" icon="Phone"></form-group>
            <form-group title="Telefon mobilni" type="tel" icon="Phone"></form-group>
            <form-group title="Nova lozinka" type="text" icon="Lock"></form-group>
            <form-group title="Potvrda nove lozinke" type="text" icon="Lock"></form-group>
            <form-group title="Pol" type="radio" icon="User" value1="Muski" value2="Zenski" value3="Drugo"></form-group>
            <form-group title="Datum prvog upisa" type="date" icon=""></form-group>
            <form-group title="Email" type="email" icon="Envelope"></form-group>
            <form-group title="Username" type="text" icon="User"></form-group>
            <button class="btn" type="submit">Pošalji</button>
         </form>
      </aside>
      <section class="entity-card-slider">
         <div class="container" data-js-entity-card-cont>

         </div>
         <button class="btn btn-transparent" style="--i:10; --j:10" data-js-show-all>Prikaži sve</button>
      </section>
   </main>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>crud form</title>
   <script type="module" src="/src/scripts/index.js"></script>
   <link rel="stylesheet" href="src/styles/style.css">
</head>

<body>
   <svg style="display: none">
      <filter id="glass-distortion">
         <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
         <feDisplacementMap in="SourceGraphic" in2="noise" scale="77" />
      </filter>
   </svg>

   <!-- <canvas id="canvas3d"></canvas> -->
   <div class="reflect-container" data-js-reflect-container>
      <div class="backdrop-blur-md" data-js-blur-overlay></div>
   </div>
   <nav class="navbar scrolled" aria-label="Main menu" data-js-navbar>
      <div class="glass-filter"></div>
      <div class="glass-overlay"></div>
      <div class="glass-specular"></div>
      <button class="burger-btn" aria-label="Open the menu" aria-expanded="false" data-js-navbar-btn>
         <i data-bx="menu"></i>
      </button>
      <ul class="nav-links" role="menubar">
         <li>
            <i data-bx="home"></i>
         </li>
         <li>
            <i data-bx="plus"></i>
         </li>
         <li>
            <i data-bx="info-circle"></i>
         </li>

      </ul>
   </nav>
   <main class="content" data-js>
      <div class="glass-form" data-js-post-form>
         <div class="glass-filter"></div>
         <div class="glass-overlay"></div>
         <div class="glass-specular"></div>
         <form class="glass-content">
            <form-group label="Ime" name="first_name" type="text" icon="User"></form-group>
            <form-group label="Prezime" name="last_name" type="text" icon="User"></form-group>
            <form-group label="Datum rodjenja" name="birthday" type="date" icon=""></form-group>
            <form-group label="JMBG" type="text" icon="User" min-length="13" max-length="13" number="true"></form-group>
            <form-group label="Broj Stana" type="number" icon="Home"></form-group>
            <form-group label="Telefon fiksni" type="tel" icon="Phone"></form-group>
            <form-group label="Telefon mobilni" type="tel" icon="Phone"></form-group>
            <form-group label="Nova lozinka" type="text" icon="Lock"></form-group>
            <form-group label="Potvrda nove lozinke" type="text" icon="Lock"></form-group>
            <form-group label="Pol" name="gender" type="radio" icon="User" options="Male, Female, Other"></form-group>
            <form-group label="Datum prvog upisa" type="date" icon=""></form-group>
            <form-group label="Email" type="email" icon="Envelope"></form-group>
            <form-group label="Username" type="text" icon="User"></form-group>
            <button class="btn" type="submit">Pošalji</button>
         </form>
      </div>
      <section class="entity-card-slider" data-js-section>
         <div class="container">

         </div>
         <button class="btn btn-transparent animation" data-js-show-all>Prikaži sve</button>
      </section>
   </main>
</body>

</html>

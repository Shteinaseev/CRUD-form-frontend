<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>crud form</title>
   <script type="module" src="/src/scripts/index.js"></script>
   <link rel="stylesheet" href="src/styles/style.css">
</head>

<body>
   <svg style="display: none">
      <filter id="glass-distortion">
         <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
         <feDisplacementMap in="SourceGraphic" in2="noise" scale="77" />
      </filter>
   </svg>

   <!-- <canvas id="canvas3d"></canvas> -->
   <div class="reflect-container" data-js-reflect-container>
      <div class="backdrop-blur-md" data-js-blur-overlay></div>
   </div>
   <nav class="navbar scrolled" aria-label="Main menu" data-js-navbar>
      <div class="glass-filter"></div>
      <div class="glass-overlay"></div>
      <div class="glass-specular"></div>
      <button class="burger-btn" aria-label="Open the menu" aria-expanded="false" data-js-navbar-btn>
         <i data-bx="menu"></i>
      </button>
      <ul class="nav-links" role="menubar">
         <li>
            <button data-js-navbar-home-btn>
               <i data-bx="home"></i>
            </button>
         </li>
         <li>
            <button data-js-navbar-add-btn>
               <i data-bx="plus"></i>
            </button>
         </li>
         <li>
            <button data-js-navbar-info-btn>
               <i data-bx="info-circle"></i>
            </button>
         </li>
      </ul>
   </nav>
   <main class="content" data-js>
      <div class="glass-form" data-js-post-form>
         <div class="glass-filter"></div>
         <div class="glass-overlay"></div>
         <div class="glass-specular"></div>
         <form class="glass-content" data-js-post-form-container>
            <button class="btn" type="submit">Pošalji</button>
            <div class="btn-wrapper" data-js-btn-wrapper>
               <button type="button" data-js-btn-index="1">1</button>
               <button type="button" data-js-btn-index="2">2</button>
               <button type="button" data-js-btn-index="3">3</button>
            </div>
         </form>

      </div>
      <section class="entity-card-slider" data-js-section>
         <div class="container">

         </div>
         <button class="btn btn-transparent animation" data-js-show-all>Prikaži sve</button>
      </section>
   </main>
</body>

</html>
